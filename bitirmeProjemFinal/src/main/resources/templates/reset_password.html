<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Şifre Sıfırlama</title>
</head>
<body>
	<section>
		<style>
			.reset-password-container {
				min-height: 80vh;
				display: flex;
				align-items: center;
				background: linear-gradient(to right, #f8f9fa, #e9ecef);
				padding: 3rem 0;
			}
			.reset-card {
				background: white;
				border: none;
				border-radius: 20px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				overflow: hidden;
				transition: all 0.3s ease;
			}
			.reset-card:hover {
				transform: translateY(-5px);
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
			}
			.reset-header {
				background: linear-gradient(to right, #007bff, #0056b3);
				padding: 2rem;
				text-align: center;
				color: white;
				border-radius: 20px 20px 0 0;
			}
			.reset-title {
				font-size: 2rem;
				font-weight: 600;
				margin-bottom: 0.5rem;
			}
			.reset-subtitle {
				color: rgba(255, 255, 255, 0.9);
				font-size: 1rem;
			}
			.reset-body {
				padding: 2rem;
			}
			.form-group {
				margin-bottom: 1.5rem;
				position: relative;
			}
			.form-control {
				border-radius: 10px;
				padding: 0.8rem 1rem;
				padding-left: 2.5rem;
				border: 2px solid #e9ecef;
				transition: all 0.3s ease;
				font-size: 1rem;
			}
			.form-control:focus {
				border-color: #007bff;
				box-shadow: none;
			}
			.form-icon {
				position: absolute;
				left: 1rem;
				top: 50%;
				transform: translateY(-50%);
				color: #6c757d;
			}
			.password-toggle {
				position: absolute;
				right: 1rem;
				top: 50%;
				transform: translateY(-50%);
				cursor: pointer;
				color: #6c757d;
			}
			.reset-btn {
				width: 100%;
				padding: 1rem;
				font-size: 1.1rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1px;
				background: linear-gradient(to right, #007bff, #0056b3);
				border: none;
				border-radius: 10px;
				color: white;
				transition: all 0.3s ease;
			}
			.reset-btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
			}
			.brand-image {
				max-width: 100%;
				height: auto;
				border-radius: 20px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				transition: all 0.3s ease;
			}
			.brand-image:hover {
				transform: scale(1.02);
			}
			.alert {
				border-radius: 10px;
				padding: 1rem;
				margin-bottom: 1.5rem;
				border: none;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			.password-requirements {
				font-size: 0.9rem;
				color: #6c757d;
				margin-top: 0.5rem;
				padding-left: 0.5rem;
			}
			.password-requirements ul {
				list-style: none;
				padding-left: 0;
				margin-bottom: 0;
			}
			.password-requirements li {
				margin-bottom: 0.25rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			.password-requirements i {
				font-size: 0.8rem;
			}
			@media (max-width: 768px) {
				.reset-password-container {
					padding: 2rem 0;
				}
				.reset-title {
					font-size: 1.5rem;
				}
			}
		</style>

		<div class="reset-password-container">
			<div class="container">
				<div class="row align-items-center">
					<div class="col-lg-6 mb-4 mb-lg-0">
						<img src="img/logo.png" alt="Logo" class="brand-image">
					</div>
					<div class="col-lg-6">
						<div class="reset-card">
							<div class="reset-header">
								<h1 class="reset-title">Şifre Sıfırlama</h1>
								<p class="reset-subtitle">Yeni şifrenizi belirleyin</p>
				</div>

							<!-- Alerts -->
							<div class="reset-body">
							<th:block th:if="${session.succMsg}">
									<div class="alert alert-success">
										<i class="fas fa-check-circle"></i>
										[[${session.succMsg}]]
									</div>
								<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errorMsg}">
									<div class="alert alert-danger">
										<i class="fas fa-exclamation-circle"></i>
										[[${session.errorMsg}]]
									</div>
								<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

								<form action="/reset-password" method="post" id="resetPassword" novalidate>
									<div class="form-group">
										<i class="fas fa-lock form-icon"></i>
										<input id="pass" class="form-control" 
											   name="password" type="password" 
											   placeholder="Yeni şifreniz"
											   required>
										<i class="fas fa-eye password-toggle" data-target="pass"></i>
						</div>

									<div class="form-group">
										<i class="fas fa-lock form-icon"></i>
										<input id="confirmPass" class="form-control" 
											   name="confirmPassword" type="password" 
											   placeholder="Şifrenizi onaylayın"
											   required>
										<i class="fas fa-eye password-toggle" data-target="confirmPass"></i>
								</div>

									<div class="password-requirements">
										<ul>
											<li><i class="fas fa-circle-info"></i> En az 8 karakter</li>
											<li><i class="fas fa-circle-info"></i> En az bir büyük harf</li>
											<li><i class="fas fa-circle-info"></i> En az bir küçük harf</li>
											<li><i class="fas fa-circle-info"></i> En az bir rakam</li>
										</ul>
								</div>

								<input type="hidden" th:value="${token}" name="token">
									<button type="submit" class="reset-btn mt-4">
										<i class="fas fa-key me-2"></i>
										Şifreyi Sıfırla
									</button>
							</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function() {
				// Şifre göster/gizle fonksiyonu
				const toggles = document.querySelectorAll('.password-toggle');
				toggles.forEach(toggle => {
					toggle.addEventListener('click', function() {
						const targetId = this.getAttribute('data-target');
						const input = document.getElementById(targetId);
						const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
						input.setAttribute('type', type);
						this.classList.toggle('fa-eye');
						this.classList.toggle('fa-eye-slash');
					});
				});

				// Şifre eşleşme kontrolü
				const form = document.getElementById('resetPassword');
				const pass = document.getElementById('pass');
				const confirmPass = document.getElementById('confirmPass');

				form.addEventListener('submit', function(e) {
					if (pass.value !== confirmPass.value) {
						e.preventDefault();
						alert('Şifreler eşleşmiyor!');
					}
				});
			});
		</script>
	</section>
</body>
</html>
