<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard | Akcan</title>
</head>
<body>
	<section>
		<style>
			/* Ana Stiller */
			:root {
				--primary-color: #3498db;
				--secondary-color: #2c3e50;
				--success-color: #2ecc71;
				--warning-color: #f1c40f;
				--danger-color: #e74c3c;
				--light-color: #f8f9fa;
				--dark-color: #2c3e50;
				--transition: all 0.3s ease;
				--border-radius: 15px;
				--card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			}

			.dashboard-container {
				padding: 2rem;
				background: linear-gradient(135deg, var(--light-color) 0%, #e9ecef 100%);
				min-height: 100vh;
			}

			.dashboard-header {
				margin-bottom: 3rem;
				text-align: center;
				position: relative;
			}

			.dashboard-title {
				font-size: 2.5rem;
				font-weight: 700;
				color: var(--dark-color);
				margin-bottom: 1rem;
				position: relative;
				display: inline-block;
			}

			.dashboard-title::after {
				content: '';
				position: absolute;
				bottom: -10px;
				left: 0;
				right: 0;
				height: 4px;
				background: linear-gradient(to right, var(--primary-color), var(--success-color));
				border-radius: 2px;
			}

			.dashboard-subtitle {
				font-size: 1.1rem;
				color: #6c757d;
				max-width: 600px;
				margin: 0 auto;
			}

			/* Kart Stilleri */
			.dashboard-card {
				background: white;
				border-radius: var(--border-radius);
				border: none;
				box-shadow: var(--card-shadow);
				transition: var(--transition);
				height: 100%;
				position: relative;
				overflow: hidden;
			}

			.dashboard-card::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 4px;
				background: linear-gradient(to right, var(--primary-color), var(--success-color));
				opacity: 0;
				transition: var(--transition);
			}

			.dashboard-card:hover {
				transform: translateY(-10px);
				box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
			}

			.dashboard-card:hover::before {
				opacity: 1;
			}

			.dashboard-card .card-body {
				padding: 2rem;
				text-align: center;
				position: relative;
				z-index: 1;
			}

			.card-icon {
				font-size: 3rem;
				margin-bottom: 1.5rem;
				transition: var(--transition);
				background: linear-gradient(45deg, var(--primary-color), var(--success-color));
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			.dashboard-card:hover .card-icon {
				transform: scale(1.1);
			}

			.card-title {
				font-size: 1.25rem;
				font-weight: 600;
				color: var(--dark-color);
				margin: 0;
				transition: var(--transition);
			}

			.dashboard-card:hover .card-title {
				color: var(--primary-color);
			}

			/* Renk Varyasyonları */
			.card-primary .card-icon {
				background: linear-gradient(45deg, #3498db, #2980b9);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			.card-success .card-icon {
				background: linear-gradient(45deg, #2ecc71, #27ae60);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			.card-warning .card-icon {
				background: linear-gradient(45deg, #f1c40f, #f39c12);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			.card-danger .card-icon {
				background: linear-gradient(45deg, #e74c3c, #c0392b);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			/* Responsive Tasarım */
			@media (max-width: 992px) {
				.dashboard-container {
					padding: 1.5rem;
				}

				.dashboard-title {
					font-size: 2rem;
				}
			}

			@media (max-width: 768px) {
				.dashboard-container {
					padding: 1rem;
				}

				.dashboard-title {
					font-size: 1.75rem;
				}

				.dashboard-card .card-body {
					padding: 1.5rem;
				}
			}

			/* Animasyonlar */
			@keyframes fadeInUp {
				from {
					opacity: 0;
					transform: translateY(20px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.animate-card {
				animation: fadeInUp 0.5s ease forwards;
				opacity: 0;
			}

			.animate-card:nth-child(1) { animation-delay: 0.1s; }
			.animate-card:nth-child(2) { animation-delay: 0.2s; }
			.animate-card:nth-child(3) { animation-delay: 0.3s; }
			.animate-card:nth-child(4) { animation-delay: 0.4s; }
			.animate-card:nth-child(5) { animation-delay: 0.5s; }
			.animate-card:nth-child(6) { animation-delay: 0.6s; }
			.animate-card:nth-child(7) { animation-delay: 0.7s; }
		</style>

		<div class="dashboard-container">
			<div class="dashboard-header">
				<h1 class="dashboard-title">Admin Kontrol Paneli</h1>
				<p class="dashboard-subtitle">Akcan Yazılım Kontrol Paneli</p>
			</div>

			<div class="row g-4">
				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/loadAddProduct" class="text-decoration-none">
						<div class="dashboard-card card-primary">
							<div class="card-body">
								<i class="fa-solid fa-square-plus card-icon"></i>
								<h4 class="card-title">Ürün Ekle</h4>
							</div>
						</div>
					</a>
				</div>

				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/category" class="text-decoration-none">
						<div class="dashboard-card card-warning">
							<div class="card-body">
								<i class="fa-solid fa-list card-icon"></i>
								<h4 class="card-title">Kategori Ekle</h4>
							</div>
						</div>
					</a>
				</div>

				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/products" class="text-decoration-none">
						<div class="dashboard-card card-success">
							<div class="card-body">
								<i class="fa-solid fa-table-list card-icon"></i>
								<h4 class="card-title">Ürünleri Görüntüle</h4>
							</div>
						</div>
					</a>
				</div>

				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/orders" class="text-decoration-none">
						<div class="dashboard-card card-warning">
							<div class="card-body">
								<i class="fa-solid fa-box-open card-icon"></i>
								<h4 class="card-title">Siparişler</h4>
							</div>
						</div>
					</a>
				</div>

				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/users?type=1" class="text-decoration-none">
						<div class="dashboard-card card-primary">
							<div class="card-body">
								<i class="fa-solid fa-circle-user card-icon"></i>
								<h4 class="card-title">Kullanıcılar</h4>
							</div>
						</div>
					</a>
				</div>

				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/add-admin" class="text-decoration-none">
						<div class="dashboard-card card-danger">
							<div class="card-body">
								<i class="fa-solid fa-user-plus card-icon"></i>
								<h4 class="card-title">Admin Ekle</h4>
							</div>
						</div>
					</a>
				</div>

				<div class="col-md-4 col-lg-3 animate-card">
					<a href="/admin/users?type=2" class="text-decoration-none">
						<div class="dashboard-card card-primary">
							<div class="card-body">
								<i class="fa-solid fa-circle-user card-icon"></i>
								<h4 class="card-title">Adminler</h4>
							</div>
						</div>
					</a>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
