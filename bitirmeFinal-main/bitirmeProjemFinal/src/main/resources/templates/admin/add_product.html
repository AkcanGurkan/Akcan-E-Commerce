<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Akcan</title>
</head>
<body>
	<section>
		<style>
			.add-product-container {
				padding: 2rem;
				background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
				min-height: 100vh;
			}
			
			.product-card {
				background: white;
				border-radius: 15px;
				border: none;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				transition: all 0.3s ease;
				overflow: hidden;
				max-width: 800px;
				margin: 0 auto;
			}
			
			.product-card:hover {
				transform: translateY(-5px);
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
			}
			
			.card-header {
				background: linear-gradient(45deg, #3498db, #2980b9);
				color: white;
				border: none;
				padding: 1.5rem;
				border-radius: 15px 15px 0 0;
			}
			
			.card-header .fs-4 {
				font-weight: 600;
				margin: 0;
				letter-spacing: 0.5px;
			}
			
			.form-label {
				font-weight: 500;
				color: #2c3e50;
				margin-bottom: 0.5rem;
			}
			
			.form-control {
				border-radius: 10px;
				border: 1px solid #e0e0e0;
				padding: 0.75rem;
				transition: all 0.3s ease;
			}
			
			.form-control:focus {
				box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
				border-color: #3498db;
			}
			
			.form-select {
				border-radius: 10px;
				border: 1px solid #e0e0e0;
				padding: 0.75rem;
			}
			
			.btn-primary {
				background: linear-gradient(45deg, #3498db, #2980b9);
				border: none;
				border-radius: 10px;
				padding: 0.75rem;
				font-weight: 600;
				letter-spacing: 0.5px;
				transition: all 0.3s ease;
			}
			
			.btn-primary:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
			}
			
			.success-message {
				background: linear-gradient(45deg, #2ecc71, #27ae60);
				color: white;
				padding: 1rem;
				border-radius: 10px;
				margin-top: 1rem;
				animation: fadeIn 0.5s ease;
			}
			
			.error-message {
				background: linear-gradient(45deg, #e74c3c, #c0392b);
				color: white;
				padding: 1rem;
				border-radius: 10px;
				margin-top: 1rem;
				animation: fadeIn 0.5s ease;
			}
			
			.status-toggle {
				background: #f8f9fa;
				padding: 1rem;
				border-radius: 10px;
				border: 1px solid #e0e0e0;
				margin-bottom: 1.5rem;
			}
			
			.custom-file-upload {
				border: 2px dashed #3498db;
				border-radius: 10px;
				padding: 1.5rem;
				text-align: center;
				cursor: pointer;
				transition: all 0.3s ease;
				margin-bottom: 1rem;
			}
			
			.custom-file-upload:hover {
				background: rgba(52, 152, 219, 0.1);
			}
			
			.input-group {
				position: relative;
			}
			
			.currency-symbol {
				position: absolute;
				left: 15px;
				top: 50%;
				transform: translateY(-50%);
				color: #6c757d;
			}
			
			.price-input {
				padding-left: 30px;
			}
			
			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(-10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
			
			.form-group {
				margin-bottom: 1.5rem;
			}
		</style>

		<div class="add-product-container">
			<div class="product-card">
				<div class="card-header text-center">
					<h2 class="fs-4">Yeni Ürün Ekle</h2>

					<th:block th:if="${session.succMsg}">
						<div class="success-message">
							<i class="fas fa-check-circle me-2"></i>
							<span>[[${session.succMsg}]]</span>
						</div>
						<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
					</th:block>

					<th:block th:if="${session.errorMsg}">
						<div class="error-message">
							<i class="fas fa-exclamation-circle me-2"></i>
							<span>[[${session.errorMsg}]]</span>
						</div>
						<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
					</th:block>
				</div>

				<div class="card-body p-4">
					<form action="/admin/saveProduct" method="post" enctype="multipart/form-data">
						<div class="form-group">
							<label class="form-label">Ürün Adı</label>
							<input type="text" name="title" class="form-control" 
								placeholder="Ürün adını giriniz">
						</div>

						<div class="form-group">
							<label class="form-label">Ürün Detayı</label>
							<textarea rows="4" class="form-control" name="description" 
								placeholder="Ürün detaylarını giriniz"></textarea>
						</div>

						<div class="row">
							<div class="col-md-6 form-group">
								<label class="form-label">Kategori Seçimi</label>
								<select class="form-select" name="category">
									<option value="">Kategori seçiniz</option>
									<option th:each="c:${categories}">[[${c.name}]]</option>
								</select>
							</div>

							<div class="col-md-6 form-group">
								<label class="form-label">Satış Fiyatı</label>
								<div class="input-group">
									<span class="currency-symbol">₺</span>
									<input type="number" name="price" class="form-control price-input" 
										placeholder="0,00">
								</div>
							</div>
						</div>

						<div class="form-group">
							<label class="form-label">Ürün Durumu</label>
							<div class="status-toggle">
								<div class="form-check mb-2">
									<input class="form-check-input" type="radio" checked
										value="true" name="isActive" id="statusActive">
									<label class="form-check-label" for="statusActive">
										<i class="fas fa-check-circle text-success me-2"></i>Satışta
									</label>
								</div>
								<div class="form-check">
									<input class="form-check-input" type="radio" name="isActive"
										value="false" id="statusInactive">
									<label class="form-check-label" for="statusInactive">
										<i class="fas fa-times-circle text-danger me-2"></i>Satışta Değil
									</label>
								</div>
							</div>
						</div>

						<div class="row">
							<div class="col-md-6 form-group">
								<label class="form-label">Stok Adedi</label>
								<input type="number" name="stock" class="form-control" 
									placeholder="0">
							</div>

							<div class="col-md-6 form-group">
								<label class="form-label">Ürün Fotoğrafı</label>
								<div class="custom-file-upload">
									<input type="file" name="file" class="form-control" 
										id="fileInput" style="display: none;">
									<label for="fileInput">
										<i class="fas fa-cloud-upload-alt fs-3 mb-2"></i>
										<div>Fotoğraf yüklemek için tıklayınız</div>
									</label>
								</div>
							</div>
						</div>

						<button class="btn btn-primary w-100">
							<i class="fas fa-plus-circle me-2"></i>Ürün Ekle
						</button>
					</form>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
