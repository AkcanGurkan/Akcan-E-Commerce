<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Akcan</title>
</head>
<body>
	<section>
		<style>
			.forgot-container {
				min-height: 80vh;
				background: linear-gradient(to right, #f8f9fa, #e9ecef);
				padding: 4rem 0;
			}
			
			.brand-image {
				max-width: 100%;
				height: auto;
				border-radius: 20px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				transition: all 0.3s ease;
			}
			
			.brand-image:hover {
				transform: scale(1.02);
			}
			
			.forgot-card {
				background: white;
				border: none;
				border-radius: 20px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				overflow: hidden;
				transition: all 0.3s ease;
			}
			
			.forgot-card:hover {
				transform: translateY(-5px);
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
			}
			
			.forgot-header {
				background: linear-gradient(to right, #007bff, #0056b3);
				padding: 2rem;
				text-align: center;
				color: white;
				border-radius: 20px 20px 0 0;
			}
			
			.forgot-title {
				font-size: 2rem;
				font-weight: 600;
				margin-bottom: 0.5rem;
			}
			
			.forgot-subtitle {
				color: rgba(255, 255, 255, 0.9);
				font-size: 1rem;
			}
			
			.forgot-body {
				padding: 2rem;
			}
			
			.form-group {
				margin-bottom: 1.5rem;
				position: relative;
			}
			
			.form-control {
				border-radius: 10px;
				padding: 0.8rem 1rem;
				padding-left: 2.5rem;
				border: 2px solid #e9ecef;
				transition: all 0.3s ease;
				font-size: 1rem;
			}
			
			.form-control:focus {
				border-color: #007bff;
				box-shadow: none;
			}
			
			.form-icon {
				position: absolute;
				left: 1rem;
				top: 50%;
				transform: translateY(-50%);
				color: #6c757d;
			}
			
			.forgot-btn {
				width: 100%;
				padding: 1rem;
				font-size: 1.1rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1px;
				background: linear-gradient(to right, #007bff, #0056b3);
				border: none;
				border-radius: 10px;
				color: white;
				transition: all 0.3s ease;
			}
			
			.forgot-btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
			}
			
			.alert {
				border-radius: 10px;
				padding: 1rem;
				margin-bottom: 1.5rem;
				border: none;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			
			.alert-success {
				background-color: #d4edda;
				color: #155724;
			}
			
			.alert-danger {
				background-color: #f8d7da;
				color: #721c24;
			}
			
			.back-link {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				text-align: center;
				margin-top: 1.5rem;
				color: #6c757d;
				text-decoration: none;
				transition: all 0.3s ease;
				padding: 0.5rem 1rem;
				border-radius: 8px;
				background: #f8f9fa;
				font-weight: 500;
			}
			
			.back-link i {
				margin-right: 0.5rem;
			}
			
			.back-link:hover {
				color: #007bff;
				background: #e9ecef;
				transform: translateY(-1px);
			}
			
			.text-center {
				text-align: center;
			}
			
			@media (max-width: 768px) {
				.forgot-container {
					padding: 2rem 1rem;
				}
				
				.forgot-title {
					font-size: 1.5rem;
				}
				
				.brand-image {
					margin-bottom: 2rem;
				}
			}
		</style>

		<div class="forgot-container">
			<div class="container">
				<div class="row align-items-center">
					<div class="col-lg-6 mb-4 mb-lg-0">
						<img src="img/logo.png" alt="Logo" class="brand-image">
					</div>
					<div class="col-lg-6">
						<div class="forgot-card">
							<div class="forgot-header">
								<h1 class="forgot-title">Şifremi Unuttum</h1>
								<p class="forgot-subtitle">E-posta adresinizi girin, size şifre sıfırlama bağlantısı gönderelim</p>
							</div>

							<div class="forgot-body">
								<th:block th:if="${session.succMsg}">
									<div class="alert alert-success">
										<i class="fas fa-check-circle"></i>
										[[${session.succMsg}]]
									</div>
									<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
								</th:block>

								<th:block th:if="${session.errorMsg}">
									<div class="alert alert-danger">
										<i class="fas fa-exclamation-circle"></i>
										[[${session.errorMsg}]]
									</div>
									<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
								</th:block>

								<form action="/forgot-password" method="post">
									<div class="form-group">
										<i class="fas fa-envelope form-icon"></i>
										<input type="email" 
											   class="form-control" 
											   name="email" 
											   placeholder="E-posta adresiniz"
											   required>
									</div>
									
									<button type="submit" class="forgot-btn">
										<i class="fas fa-paper-plane me-2"></i>Şifre Sıfırlama Bağlantısı Gönder
									</button>
								</form>

								<div class="text-center">
									<a href="/signin" class="back-link">
										<i class="fas fa-arrow-left"></i>
										Giriş Sayfasına Dön
									</a>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
