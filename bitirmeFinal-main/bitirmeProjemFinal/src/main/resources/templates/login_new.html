<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>AKcan</title>
</head>
<body>

<section>
    <style>
        :root {
            --primary-color: #3498db;
            --primary-dark: #2980b9;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --background-color: #f8f9fa;
            --transition: all 0.3s ease;
        }
        
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--background-color) 0%, #e9ecef 100%);
            padding: 2rem 0;
        }
        
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            display: flex;
            flex-direction: row;
        }
        
        .form-side {
            flex: 1;
            padding: 2rem;
            position: relative;
        }
        
        .image-side {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }
        
        .auth-tab {
            padding: 1rem 2rem;
            font-weight: 600;
            color: var(--secondary-color);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            background: transparent;
            border: none;
        }
        
        .auth-tab.active {
            color: var(--primary-color);
        }
        
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-color);
            border-radius: 3px 3px 0 0;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .form-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .form-subtitle {
            color: #6c757d;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: var(--transition);
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.25);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group-text {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: var(--primary-color);
        }
        
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }
        
        .password-toggle {
            cursor: pointer;
        }
        
        .auth-btn {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 10px;
            color: white;
            transition: var(--transition);
            margin-top: 1rem;
        }
        
        .auth-btn:hover {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
        }
        
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .auth-footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        .image-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .image-text {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        
        .image-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
        }
        
        .alert {
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: none;
        }
        
        .row {
            --bs-gutter-x: 1.5rem;
            --bs-gutter-y: 0;
            display: flex;
            flex-wrap: wrap;
            margin-top: calc(-1 * var(--bs-gutter-y));
            margin-right: calc(-.5 * var(--bs-gutter-x));
            margin-left: calc(-.5 * var(--bs-gutter-x));
        }
        
        .row > * {
            flex-shrink: 0;
            width: 100%;
            max-width: 100%;
            padding-right: calc(var(--bs-gutter-x) * .5);
            padding-left: calc(var(--bs-gutter-x) * .5);
            margin-top: var(--bs-gutter-y);
        }
        
        .col-12 {
            flex: 0 0 auto;
            width: 100%;
        }
        
        .col-md-6 {
            flex: 0 0 auto;
            width: 50%;
        }
        
        .col-md-4 {
            flex: 0 0 auto;
            width: 33.33333333%;
        }
        
        @media (max-width: 768px) {
            .auth-card {
                flex-direction: column;
            }
            
            .image-side {
                display: none;
            }
            
            .col-md-6, .col-md-4 {
                width: 100%;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <div class="auth-container">
        <div class="auth-card">
            <div class="form-side">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="login-tab">Giriş Yap</button>
                    <button class="auth-tab" id="register-tab">Kayıt Ol</button>
                </div>
                
                <!-- Giriş Formu -->
                <div class="auth-form active" id="login-form">
                    <h2 class="form-title">Hoş Geldiniz</h2>
                    <p class="form-subtitle">Hesabınıza giriş yapın</p>
                    
                    <!-- Error Message -->
                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <th:block th:if="${session.error != null}">
                            [[${session.error}]]
                        </th:block>
                        <th:block th:unless="${session.error != null}">
                            E-posta veya şifre hatalı!
                        </th:block>
                    </div>

                    <!-- Logout Message -->
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        Başarıyla çıkış yapıldı
                    </div>
                    
                    <form action="/login" method="post">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope"></i>
                                </span>
                                <input required class="form-control" name="username" type="email" 
                                       placeholder="örnek@email.com">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Şifre</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input required class="form-control" name="password" type="password" 
                                       placeholder="••••••••" id="login-password">
                                <span class="input-group-text password-toggle" data-target="login-password">
                                    <i class="fas fa-eye"></i>
                                </span>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn auth-btn">
                            <i class="fas fa-sign-in-alt me-2"></i>Giriş Yap
                        </button>
                    </form>
                    
                    <div class="auth-footer">
                        <a href="/forgot-password">
                            <i class="fas fa-key me-1"></i>
                            Şifremi Unuttum
                        </a>
                    </div>
                </div>
                
                <!-- Kayıt Formu -->
                <div class="auth-form" id="register-form">
                    <h2 class="form-title">Kayıt Ol</h2>
                    <p class="form-subtitle">Yeni hesap oluşturun</p>
                    
                    <form action="/saveUser" method="post" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Ad Soyad</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-user"></i>
                                        </span>
                                        <input required class="form-control" name="name" type="text" 
                                               placeholder="Ad Soyad">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Telefon</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-phone"></i>
                                        </span>
                                        <input required class="form-control" name="mobileNumber" type="tel" 
                                               placeholder="Telefon Numarası">
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-envelope"></i>
                                        </span>
                                        <input required class="form-control" name="email" type="email" 
                                               placeholder="örnek@email.com">
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Adres</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-map-marker-alt"></i>
                                        </span>
                                        <input required class="form-control" name="address" type="text" 
                                               placeholder="Adres">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Şehir</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-city"></i>
                                        </span>
                                        <input required class="form-control" name="city" type="text" 
                                               placeholder="Şehir">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">İlçe</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-map"></i>
                                        </span>
                                        <input required class="form-control" name="state" type="text" 
                                               placeholder="İlçe">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Posta Kodu</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-map-pin"></i>
                                        </span>
                                        <input required class="form-control" name="pincode" type="text" 
                                               placeholder="Posta Kodu">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Şifre</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                        <input required class="form-control" name="password" type="password" 
                                               placeholder="••••••••" id="reg-password">
                                        <span class="input-group-text password-toggle" data-target="reg-password">
                                            <i class="fas fa-eye"></i>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Şifreyi Onayla</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                        <input required class="form-control" name="confirmpassword" type="password" 
                                               placeholder="••••••••" id="reg-confirm-password">
                                        <span class="input-group-text password-toggle" data-target="reg-confirm-password">
                                            <i class="fas fa-eye"></i>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Profil Fotoğrafı</label>
                                    <div class="input-group">
                                        <input type="file" name="img" class="form-control" id="profileImage" 
                                               accept="image/*">
                                    </div>
                                    <div class="mt-2 text-center d-none" id="imagePreviewContainer">
                                        <img id="imagePreview" alt="Önizleme" style="max-width: 150px; max-height: 150px; border-radius: 50%;">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn auth-btn">
                            <i class="fas fa-user-plus me-2"></i>Kayıt Ol
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="image-side">
                <div class="image-icon">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <h2 class="image-title">Akcan Alışveriş</h2>
                <p class="image-text">En kaliteli ürünleri en uygun fiyatlarla sizlere sunuyoruz. Hemen üye olun, alışverişin keyfini çıkarın!</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Tab değiştirme
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            loginTab.addEventListener('click', function() {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            });
            
            registerTab.addEventListener('click', function() {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            });
            
            // Şifre göster/gizle fonksiyonu
            const togglePasswords = document.querySelectorAll('.password-toggle');
            
            togglePasswords.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    // İkon değiştirme
                    const icon = this.querySelector('i');
                    if (type === 'text') {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
            
            // Profil resmi önizleme
            const profileImage = document.getElementById('profileImage');
            const imagePreview = document.getElementById('imagePreview');
            const imagePreviewContainer = document.getElementById('imagePreviewContainer');
            
            if (profileImage && imagePreview && imagePreviewContainer) {
                profileImage.addEventListener('change', function(e) {
                    if (e.target.files && e.target.files[0]) {
                        const reader = new FileReader();
                        
                        reader.onload = function(e) {
                            imagePreview.src = e.target.result;
                            imagePreviewContainer.classList.remove('d-none');
                        }
                        
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });
            }
        });
    </script>
</section>

</body>
</html>
